<svg width="480" height="120" viewBox="0 0 480 120" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ─── ICON MARK ─── -->
  <rect x="0" y="10" width="100" height="100" rx="22" fill="#004aad"/>
  <rect x="0" y="10" width="100" height="100" rx="22" fill="url(#glowFull)" opacity="0.3"/>

  <!-- Cross vertical -->
  <rect x="42" y="24" width="16" height="72" rx="8" fill="white" opacity="0.95"/>
  <!-- Cross horizontal -->
  <rect x="20" y="52" width="60" height="16" rx="8" fill="white" opacity="0.95"/>

  <!-- ECG pulse line -->
  <path
    d="M14 60 H30 L35 40 L42 80 L49 40 L56 80 L62 60 H86"
    stroke="#7ed957"
    stroke-width="4.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Corner accents -->
  <circle cx="14" cy="20" r="2.5" fill="#7ed957" opacity="0.5"/>
  <circle cx="86" cy="100" r="2.5" fill="#7ed957" opacity="0.5"/>

  <!-- ─── WORDMARK ─── -->
  <!-- "Nova" — Inter Bold, foreground -->
  <text
    x="120"
    y="74"
    font-family="Inter, -apple-system, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#0b1c30"
  >Nova</text>

  <!-- "Med" — Inter Bold, Medical Blue -->
  <text
    x="271"
    y="74"
    font-family="Inter, -apple-system, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#004aad"
  >Med</text>

  <!-- Tagline -->
  <text
    x="121"
    y="96"
    font-family="Inter, -apple-system, sans-serif"
    font-size="13"
    font-weight="500"
    letter-spacing="3"
    fill="#737784"
  >BUSINESS SOLUTIONS</text>

  <!-- Accent line under tagline -->
  <rect x="121" y="102" width="52" height="2" rx="1" fill="#7ed957"/>

  <defs>
    <radialGradient id="glowFull" cx="25%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#001945" stop-opacity="1"/>
    </radialGradient>
  </defs>
</svg>
